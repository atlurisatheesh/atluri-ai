version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
#  PRODUCTION DEPLOYMENT — Single Server
#  PostgreSQL + Redis + Backend + Frontend + Nginx (SSL) + Desktop Downloads
#
#  Prerequisites on server:
#    1. Docker + Docker Compose installed
#    2. Domain pointed to server IP (e.g. app.atluriin.com)
#    3. .env file in backend/ with all secrets
#    4. Desktop builds placed in ./desktop-releases/
#
#  Usage:
#    docker-compose -f docker-compose.prod.yml up -d
#    docker-compose -f docker-compose.prod.yml logs -f
# ═══════════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_ai}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Backend API (FastAPI + uvicorn) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=9010
      - WORKERS=${BACKEND_WORKERS:-4}
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-localdev123}@postgres:5432/${POSTGRES_DB:-linkedin_ai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - USE_REDIS_ROOM_STATE=true
      - ROOM_EVENT_BUS_ENABLED=true
      - WS_MAX_CONCURRENT=100
      - WS_QUEUE_SIZE=200
      - WS_QUEUE_MAX_WAIT=10
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX_REQUESTS=300
      - SESSION_CLEANUP_TTL_SEC=1800
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://app.atluriin.com,http://localhost:3001}
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://127.0.0.1:9010/healthz'); assert r.status_code==200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Frontend (Next.js static export) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  # ─── Nginx (SSL + reverse proxy + desktop downloads) ────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./desktop-releases:/usr/share/nginx/downloads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
