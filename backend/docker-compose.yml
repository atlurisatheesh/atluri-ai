# ═══════════════════════════════════════════════════════════════════════
#  docker-compose: Production-ready stack
#  - Redis (session state, event bus, user context)
#  - 4x Backend workers via uvicorn --workers
#  - Nginx load balancer
#
#  Usage:
#    docker-compose up -d
#    docker-compose logs -f backend
# ═══════════════════════════════════════════════════════════════════════
version: "3.9"

services:
  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Backend (4 workers) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9010:9010"
    environment:
      - HOST=0.0.0.0
      - PORT=9010
      - WORKERS=4
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_ROOM_STATE=true
      - ROOM_EVENT_BUS_ENABLED=true
      - WS_MAX_CONCURRENT=100
      - WS_QUEUE_SIZE=200
      - WS_QUEUE_MAX_WAIT=10
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX_REQUESTS=300
      - SESSION_CLEANUP_TTL_SEC=1800
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://127.0.0.1:9010/healthz'); assert r.status_code==200"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ─── Nginx Load Balancer ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
