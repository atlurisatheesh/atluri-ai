# ═══════════════════════════════════════════════════════════════════════
#  NGINX Load Balancer — reverse proxy + WebSocket upgrade
#  Distributes traffic across 4 uvicorn backend instances.
#
#  Usage:
#    1. Start 4 backend instances on ports 9010-9013
#    2. nginx -c /path/to/nginx-lb.conf
#       or copy to /etc/nginx/conf.d/
#
#  For Docker:
#    docker run -p 80:80 -v $(pwd)/nginx-lb.conf:/etc/nginx/conf.d/default.conf nginx
# ═══════════════════════════════════════════════════════════════════════

# ─── Upstream: 4 backend workers ──────────────────────────────────────
# When using uvicorn --workers 4 on a single port, this upstream
# is only needed if running SEPARATE processes on different ports.
# For single-port multi-worker, just proxy to that one port.

upstream backend_pool {
    # Strategy: least_conn distributes to the worker with fewest
    # active connections — ideal for WebSocket where connections
    # are long-lived and uneven.
    least_conn;

    # Option A: Single uvicorn with --workers 4 (OS handles load balancing)
    server 127.0.0.1:9010;

    # Option B: 4 separate processes (uncomment and comment out Option A)
    # server 127.0.0.1:9010;
    # server 127.0.0.1:9011;
    # server 127.0.0.1:9012;
    # server 127.0.0.1:9013;

    # Sticky sessions via IP hash (optional — Use if sessions are not
    # fully Redis-backed yet and need process affinity)
    # ip_hash;

    # Keep idle connections alive to reduce TCP overhead
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # ─── Global settings ──────────────────────────────────────────────
    client_max_body_size 20m;           # Resume uploads up to 20MB
    proxy_read_timeout 300s;            # Long WebSocket sessions
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # ─── Health check ─────────────────────────────────────────────────
    location /healthz {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket: /ws/ paths ────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (critical)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client identity
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for WS — interviews can last 30-60 min
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── REST API: all /api/ paths ────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming responses (SSE for /api/chat/stream)
        proxy_buffering off;
        proxy_cache off;

        # Connection reuse to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Static / catch-all (forward to Next.js or 404) ──────────────
    location / {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
