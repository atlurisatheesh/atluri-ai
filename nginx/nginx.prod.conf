# ═══════════════════════════════════════════════════════════════════════
#  PRODUCTION NGINX — Single Server Deployment
#  Handles: SSL termination, frontend, backend API, WebSocket, desktop downloads
#
#  Replace YOUR_DOMAIN with your actual domain (e.g. app.atluriin.com)
#  Place SSL certs in ./nginx/ssl/ (fullchain.pem + privkey.pem)
# ═══════════════════════════════════════════════════════════════════════

# ─── Rate limiting zones ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=downloads:10m rate=2r/s;

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL certificates ──────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Global settings ───────────────────────────────────────────────
    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # ── Health check (no rate limit) ──────────────────────────────────
    location /healthz {
        proxy_pass http://backend:9010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket: /ws/ paths ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend:9010;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client identity
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for interviews (up to 60 min)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # No buffering for real-time
        proxy_buffering off;
        proxy_cache off;
    }

    # ── REST API: /api/ paths ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend:9010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Desktop downloads: /download/ ─────────────────────────────────
    # Users download the desktop installer from here
    # Files placed in ./desktop-releases/ are served at /download/
    location /download/ {
        limit_req zone=downloads burst=5 nodelay;

        alias /usr/share/nginx/downloads/;
        autoindex on;
        autoindex_format json;

        # Force download for installer files
        types {
            application/octet-stream exe msi dmg AppImage deb;
            application/zip zip;
        }
        default_type application/octet-stream;

        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # ── Download page (JSON listing for frontend) ─────────────────────
    location = /api/downloads {
        alias /usr/share/nginx/downloads/;
        autoindex on;
        autoindex_format json;
        default_type application/json;
    }

    # ── Frontend (Next.js static export) ──────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
